<!DOCTYPE html>
<html>
<head>
<title>Smart Campus</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
}

.container{
width:350px;
margin:auto;
background:white;
padding:20px;
margin-top:50px;
box-shadow:0px 0px 10px gray;
}

input,select{
width:90%;
padding:10px;
margin:5px;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid gray;
padding:8px;
}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div class="container" id="loginPage">

<h2>Smart Campus Login</h2>

<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>

<button type="button" onclick="login()">Login</button>

<p id="msg"></p>

</div>

<!-- DASHBOARD -->

<div id="dashboard" style="display:none">

<h2>Smart Campus Dashboard</h2>

<h3>Attendance</h3>

<input id="name" placeholder="Student Name">
<input id="roll" placeholder="Roll Number">

<select id="status">
<option>Present</option>
<option>Absent</option>
</select>

<button onclick="addAttendance()">Add Attendance</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Roll</th>
<th>Status</th>
</tr>
</thead>

<tbody id="attendanceTable"></tbody>

</table>

<hr>

<h3>Assignment</h3>

<input id="assignmentTitle" placeholder="Assignment Title">
<input id="assignmentDesc" placeholder="Description">

<button onclick="addAssignment()">Add Assignment</button>

<ul id="assignmentList"></ul>

<hr>

<h3>Notice Board</h3>

<input id="noticeText" placeholder="Enter Notice">

<button onclick="addNotice()">Post Notice</button>

<ul id="noticeList"></ul>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

const firebaseConfig = {

apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
projectId: "YOUR_PROJECT",
storageBucket: "YOUR_PROJECT.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"

};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

function login(){

var user=document.getElementById("username").value;
var pass=document.getElementById("password").value;

if(user=="admin" && pass=="1234"){

document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";

loadAttendance();
loadAssignments();
loadNotices();

}else{

document.getElementById("msg").innerHTML="Invalid Login";

}

}

function addAttendance(){

var name=document.getElementById("name").value;
var roll=document.getElementById("roll").value;
var status=document.getElementById("status").value;

db.ref("attendance").push({
name:name,
roll:roll,
status:status
});

}

function loadAttendance(){

db.ref("attendance").on("value",function(snapshot){

var table="";

snapshot.forEach(function(data){

var d=data.val();

table+="<tr>";
table+="<td>"+d.name+"</td>";
table+="<td>"+d.roll+"</td>";
table+="<td>"+d.status+"</td>";
table+="</tr>";

});

document.getElementById("attendanceTable").innerHTML=table;

});

}

function addAssignment(){

var title=document.getElementById("assignmentTitle").value;
var desc=document.getElementById("assignmentDesc").value;

db.ref("assignments").push({
title:title,
desc:desc
});

}

function loadAssignments(){

db.ref("assignments").on("value",function(snapshot){

var list="";

snapshot.forEach(function(data){

var d=data.val();

list+="<li>"+d.title+" - "+d.desc+"</li>";

});

document.getElementById("assignmentList").innerHTML=list;

});

}

function addNotice(){

var notice=document.getElementById("noticeText").value;

db.ref("notices").push({
text:notice
});

}

function loadNotices(){

db.ref("notices").on("value",function(snapshot){

var list="";

snapshot.forEach(function(data){

var d=data.val();

list+="<li>"+d.text+"</li>";

});

document.getElementById("noticeList").innerHTML=list;

});

}

</script>

</body>
</html>
