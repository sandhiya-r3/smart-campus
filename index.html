<!DOCTYPE html>
<html>
<head>
<title>Smart Campus</title>

<style>
body{
font-family: Arial;
background:#f0f2f5;
text-align:center;
}

.box{
background:white;
padding:20px;
width:350px;
margin:auto;
margin-top:60px;
box-shadow:0px 0px 10px gray;
}

input,select{
width:90%;
padding:10px;
margin:5px;
}

button{
padding:10px 15px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

table{
margin:auto;
margin-top:15px;
border-collapse:collapse;
}

th,td{
border:1px solid gray;
padding:8px;
}
</style>

</head>

<body>

<div id="loginPage" class="box">

<h2>Smart Campus Login</h2>

<input type="text" id="username" placeholder="Username"><br>
<input type="password" id="password" placeholder="Password"><br>

<button type="button" onclick="login()">Login</button>

<p id="loginMsg"></p>

</div>

<div id="dashboard" style="display:none">

<h2>Smart Campus Dashboard</h2>

<h3>Attendance</h3>

<input id="name" placeholder="Student Name">
<input id="roll" placeholder="Roll Number">

<select id="status">
<option>Present</option>
<option>Absent</option>
</select>

<button onclick="addAttendance()">Add Attendance</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Roll</th>
<th>Status</th>
</tr>
</thead>
<tbody id="attendanceTable"></tbody>
</table>

<hr>

<h3>Assignments</h3>

<input id="assignTitle" placeholder="Assignment Title">
<input id="assignDesc" placeholder="Description">

<button onclick="addAssignment()">Add Assignment</button>

<ul id="assignmentList"></ul>

<hr>

<h3>Notice Board</h3>

<input id="noticeText" placeholder="Enter Notice">

<button onclick="addNotice()">Post Notice</button>

<ul id="noticeList"></ul>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
projectId: "YOUR_PROJECT",
storageBucket: "YOUR_PROJECT.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

function login(){

var u=document.getElementById("username").value.trim();
var p=document.getElementById("password").value.trim();

if(u==="admin" && p==="1234"){

document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";

loadAttendance();
loadAssignments();
loadNotices();

}else{

document.getElementById("loginMsg").innerText="Wrong Username or Password";

}

}

function addAttendance(){

var name=document.getElementById("name").value;
var roll=document.getElementById("roll").value;
var status=document.getElementById("status").value;

db.ref("attendance").push({
name:name,
roll:roll,
status:status
});

}

function loadAttendance(){

db.ref("attendance").on("value",function(snapshot){

var html="";

snapshot.forEach(function(child){

var d=child.val();

html+="<tr><td>"+d.name+"</td><td>"+d.roll+"</td><td>"+d.status+"</td></tr>";

});

document.getElementById("attendanceTable").innerHTML=html;

});

}

function addAssignment(){

var title=document.getElementById("assignTitle").value;
var desc=document.getElementById("assignDesc").value;

db.ref("assignments").push({
title:title,
desc:desc
});

}

function loadAssignments(){

db.ref("assignments").on("value",function(snapshot){

var html="";

snapshot.forEach(function(child){

var d=child.val();

html+="<li>"+d.title+" : "+d.desc+"</li>";

});

document.getElementById("assignmentList").innerHTML=html;

});

}

function addNotice(){

var text=document.getElementById("noticeText").value;

db.ref("notices").push({
text:text
});

}

function loadNotices(){

db.ref("notices").on("value",function(snapshot){

var html="";

snapshot.forEach(function(child){

var d=child.val();

html+="<li>"+d.text+"</li>";

});

document.getElementById("noticeList").innerHTML=html;

});

}

</script>

</body>
</html>
